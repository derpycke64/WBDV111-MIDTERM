<!DOCTYPE html>
<html>
<head>
    <title>Register - Velvet Crust Cakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<nav>
    <a href="index.html" class="nav-logo">Velvet Crust Cakes</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="orders.html">Orders</a>
        <a href="designs.html">Designs</a>
        <a href="pickup.html">Pickup</a>
        <a href="schedule.html">Schedule</a>
        <a href="login.html" class="login-btn">Login</a>
    </div>
</nav>

<div class="login-wrapper">
    <div class="glass-card">

        <h2>Create Account</h2>
        <p class="glass-sub">Join the Velvet Crust family</p>

        <form id="regForm" onsubmit="handleRegister(event)">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@email.com" required>

            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="+63 912 345 6789">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required>

            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Re-enter your password" required>

            <button type="submit" class="btn-cream">Create Account</button>

        </form>

        <div class="glass-switch">
            Already have an account? <a href="login.html">Login here</a>
        </div>

        <p id="success-msg" style="display:none; color:#0edd0e; text-align:center; margin-top:10px; font-size:13px; font-weight:bold;">
            Account created! <a href="login.html" style="color:#f09e10;">Click here to login.</a>
        </p>

    </div>
</div>

<footer>
    <p>Copyright 2025 Velvet Crust Cakes. All rights reserved.</p>
</footer>

<script>
    function handleRegister(e) {
        e.preventDefault();
        var pw = document.getElementById('password').value;
        var cpw = document.getElementById('confirm').value;

        if (pw != cpw) {
            alert('Passwords do not match!');
            return;
        }

        document.getElementById('regForm').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    }
</script>

</body>
</html>

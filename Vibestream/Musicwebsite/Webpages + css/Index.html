<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com' rel='stylesheet'>
    <title>Login</title>
</head>
<body>
    <div class="Headerdiv">
        <div class="Headerbox">
            <div class="Grouplogo">
                <a href="https://music.youtube.com" target="_blank">
                    <img src="../Logos/Logo.png" class="HeaderLogo" style="margin-top: 15%;">
                </a>
            </div>  
        </div>
    </div>
    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <a href="Home.html" class="btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                Login
            </a>
            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>
</body>
</html>
